<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Groovin' Around - Música i Sonoritzacions (Amb Menú)</title>
    <link rel="icon" type="image/svg+xml" href="logo.svg">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;700&display=swap" rel="stylesheet">
    <meta property="og:title" content="Groovin' Around" />
    <meta property="og:description" content="Música en directe, Sonoritzacions i Il·luminació." />
    <meta property="og:image" content="https://www.groovinaround.com/logocolor.png" />
    <meta property="og:url" content="https://www.groovinaround.com/" />

    <style>
        /* 1. CONFIGURACIÓ GENERAL DE LA PÀGINA */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #f7d648; /* El groc corporatiu de la teva captura */
            color: #1a1a1a;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* CONTAINER GENERAL */
        .site-container {
            width: 95%;
            max-width: 1200px;
            margin: 20px auto;
            background-color: #f7d648;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            position: relative; /* Per al menú desplegable */
        }

        /* 2. HEADER: LOGO I MENÚ RESPONSIVE */
        header {
            padding: 20px 0;
            display: flex;
            justify-content: space-between; /* Logo esquerra, menú dreta */
            align-items: center;
            position: relative; /* Per al menú desplegable */
            z-index: 100; /* Assegura que el header estigui a sobre del contingut */
        }

        .logo-link {
            display: inline-block;
            line-height: 0;
            transition: transform 0.2s ease;
        }

        .logo-link:hover {
            transform: scale(1.02);
        }

        .logo {
            max-width: 220px;
            height: auto;
        }

        /* ICONA DE MENÚ HAMBURGER (Tres línies) */
        .menu-icon {
            display: flex;
            flex-direction: column;
            gap: 6px;
            cursor: pointer;
            padding: 10px;
            transition: opacity 0.3s ease;
        }

        .menu-icon:hover {
            opacity: 0.8;
        }

        .bar {
            width: 35px;
            height: 4px;
            background-color: #1a1a1a; /* Negre com el text */
            border-radius: 4px;
            transition: all 0.3s ease;
        }

        /* EL MENÚ DESPLEGABLE ANIMAT (Sense display:none per permetre transicions) */
        .dropdown-menu {
            position: absolute;
            top: 100%; /* Just a sota del header */
            right: 0;
            width: auto;
            min-width: 200px;
            
            /* CANVI D'OPACITAT AQUÍ: 26, 26, 26 és el #1a1a1a i 0.75 és el 75% d'opacitat */
            background-color: rgba(26, 26, 26, 0.75); 
            backdrop-filter: blur(5px); /* Efecte extra: difumina el fons groc que es veu a través */
            
            border-radius: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.25);
            padding: 10px 0;
            
            /* ESTAT INICIAL PER A LA TRANSICIÓ ACCESSIBLE */
            opacity: 0;
            visibility: hidden;
            transform: translateY(-15px);
            transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s ease;
        }

        /* Classe que afegirem amb JS per mostrar el menú de manera fluida */
        .dropdown-menu.open {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-menu ul {
            list-style: none;
        }

        /* ELS ENLLAÇOS DEL MENÚ */
        .dropdown-menu a {
            display: block;
            padding: 15px 25px;
            text-decoration: none;
            color: #ffffff; /* El text es manté 100% blanc i llegible */
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-weight: 600;
            font-size: 1rem;
            transition: background-color 0.2s ease;
        }

        .dropdown-menu a:hover {
            /* Fons una mica més marcat en passar-hi el ratolí, mantenint la transparència */
            background-color: rgba(255, 255, 255, 0.1); 
        }

        /* Ajustaments per quan el menú està obert (Efecte creu) */
        .menu-icon.active .bar:nth-child(1) {
            transform: translateY(10px) rotate(45deg);
        }
        .menu-icon.active .bar:nth-child(2) {
            opacity: 0;
        }
        .menu-icon.active .bar:nth-child(3) {
            transform: translateY(-10px) rotate(-45deg);
        }

        /* 3. COS PRINCIPAL */
        .main-content {
            display: flex;
            flex-direction: column;
            gap: 40px;
            padding: 40px 0;
            flex-grow: 1;
        }

        @media (min-width: 768px) {
            .main-content {
                flex-direction: row;
                align-items: center;
                justify-content: space-between;
            }
            .text-column {
                flex: 1;
                max-width: 55%;
            }
            .video-column {
                flex: 1;
                max-width: 42%;
            }
        }

        /* TEXTOS */
        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            line-height: 1.2;
            margin-bottom: 25px;
            color: #1a1a1a;
            letter-spacing: -1px;
        }

        .subtitle {
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 35px;
            color: #333333;
            font-weight: 500;
        }

        /* BOTÓ CONTACTA'NS */
        .btn-contact {
            display: inline-block;
            background-color: #1f6f62;
            color: #ffffff;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            transition: background-color 0.3s ease, transform 0.2s ease;
        }

        .btn-contact:hover {
            background-color: #17544a;
            transform: translateY(-2px);
        }

        /* MULTIMÈDIA / VIDEO YOUTUBE */
        .video-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* Relació d'aspecte 16:9 */
            height: 0;
            border-radius: 24px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
        }

        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
        }

        /* 4. FOOTER */
        footer {
            background-color: #ebd154;
            padding: 20px;
            text-align: center;
            font-size: 0.9rem;
            font-weight: 500;
            color: #2b2b2b;
            margin-top: auto;
            border-radius: 0 0 12px 12px;
        }
    </style>
</head>
<body>

    <div class="site-container">
        
        <header>
            <a href="index.html" class="logo-link">
                <img src="logo.png" alt="Groovin' Around Logo" class="logo">
            </a>
            
            <div class="menu-icon" id="menu-icon">
                <div class="bar"></div>
                <div class="bar"></div>
                <div class="bar"></div>
            </div>
            
            <nav id="dropdown-menu" class="dropdown-menu">
                <ul>
                    <li><a href="musica.html">Música</a></li>   
                    <li><a href="qui-som.html">Qui som?</a></li>      
                    <li><a href="manifest.html" target="_blank">Manifest</a></li>
                </ul>
            </nav>
        </header>

        <main class="main-content">
            
            <div class="text-column">
                <h1>Música en directe,<br>sonoritzacions /<br>il·luminació</h1>
                
                <p class="subtitle">
                    Versions d'Horace Silver, Bob Marley, Dimitri Shostakovich, Johnny Hodges, Erik Satie, The Meters i més!
                </p>
                
                <a href="mailto:info@groovinaround.com" class="btn-contact">Contacta'ns</a>
            </div>

            <div class="video-column">
                <div class="video-container">
                    <iframe src="https://www.youtube.com/embed/5eh9qBH933M?si=Mjc_XcHwqmwVdmLl" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
                </div>
            </div>

        </main>

    </div>

    <footer>
        &copy; Groovin' Around 2026 - All Rights Reserved
    </footer>

    <script>
        const menuIcon = document.getElementById('menu-icon');
        const dropdownMenu = document.getElementById('dropdown-menu');

        menuIcon.addEventListener('click', function() {
            dropdownMenu.classList.toggle('open');
            menuIcon.classList.toggle('active');
        });

        window.addEventListener('click', function(event) {
            if (!menuIcon.contains(event.target) && !dropdownMenu.contains(event.target)) {
                dropdownMenu.classList.remove('open');
                menuIcon.classList.remove('active');
            }
        });
    </script>

</body>
</html>
